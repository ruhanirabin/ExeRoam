[Launcher]
; The script currently uses Win+Alt+Space.
; AutoHotkey notation: # = Win, ! = Alt, ^ = Ctrl, + = Shift
Hotkey=#!Space
; 1 centers the launcher on the monitor containing the mouse pointer.
; 0 uses the default Windows/AutoHotkey centering behavior.
CenterOnMouseMonitor=1

[Scanner]
; AutoHotkey regular expression matched against executable filenames.
; Leave blank to disable executable-name exclusions.
ExcludedExecutables=i)^(unins.*|uninstall.*|setup.*|install.*|update.*|updater.*|crash.*|crashreport.*|report.*|helper.*|service.*|notificationhelper.*|elevate.*)\.exe$

[Roots]
; Paths in apps.tsv use {ROOT1}, {ROOT2}, etc.
; Change these values after reinstalling Windows or changing drive letters.
Root1=D:\Programs
Root2=H:\Programs
